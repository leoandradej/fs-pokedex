name: Health check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        uses: Jtalk/url-health-check-action@v4
        with:
          url: https://fs-pokedex-b83b.onrender.com/health
          max-attempts: 3
          retry-delay: 5s
